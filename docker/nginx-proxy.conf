worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    keepalive_timeout 65;

    # ── Rate-limiting zones ──────────────────────────────────────────────────
    # General API: 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
    # Verify endpoints (OCR is compute-heavy): 20 req/min per IP
    limit_req_zone $binary_remote_addr zone=verify:10m  rate=20r/m;
    # Login: 5 req/min per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:5m     rate=5r/m;
    # Max concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # Return 429 (not 503) on rate limit / connection limit
    limit_req_status  429;
    limit_conn_status 429;

    server {
        listen 80;
        server_name _;

        # Max 30 concurrent connections per IP
        limit_conn conn_per_ip 30;

        # Reject bodies larger than 6 MB (above the 5 MB upload limit)
        client_max_body_size 6m;

        # Pass real client IP to upstream services
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Login — strict (brute-force protection) ──────────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://backend:3001/auth/;
        }

        # ── Verify — OCR is expensive, keep strict ───────────────────────────
        location /api/verify/ {
            limit_req zone=verify burst=5 nodelay;
            proxy_pass http://backend:3001/verify/;
        }

        # ── General backend API ──────────────────────────────────────────────
        location /api/ {
            limit_req zone=general burst=30 nodelay;
            proxy_pass http://backend:3001/;
        }

        # ── Admin console (SPA) ──────────────────────────────────────────────
        location /admin/ {
            limit_req zone=general burst=30 nodelay;
            proxy_pass http://admin-console:80/;
        }

        # ── Gate client (SPA, default) ───────────────────────────────────────
        location / {
            limit_req zone=general burst=30 nodelay;
            proxy_pass http://gate-client:80/;
        }
    }
}
