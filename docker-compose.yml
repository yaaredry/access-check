version: '3.9'

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: access-check-proxy
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx-proxy.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - admin-console
      - gate-client
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: access-check-db
    environment:
      POSTGRES_DB: access_check
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: access-check-backend
    env_file: .env
    environment:
      DB_HOST: postgres
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  admin-console:
    build:
      context: ./admin-console
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: access-check-admin
    depends_on:
      - backend
    restart: unless-stopped

  gate-client:
    build:
      context: ./gate-client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: access-check-gate
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
