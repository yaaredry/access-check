name: Claude Code Review
on:
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for: logic errors, security issues (SQL injection,
            XSS, auth bypasses, etc.), broken edge cases, and correctness of
            the OCR/verify pipeline. Follow the standards in CLAUDE.md. Post
            inline comments on specific lines where issues are found.
          claude_args: "--max-turns 5 --model claude-sonnet-4-6"
